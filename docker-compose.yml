

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: energy-watchtower-backend

    ports:
      - "${API_PORT}:8000"

    env_file:
      - .env

    volumes:
      - ./backend/app/data:/app/app/data

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: energy-watchtower-frontend

    ports:
      - "${FRONTEND_PORT}:3000"

    environment:
      # BACKEND_URL tells Next.js server-side rewrite proxy where to forward /api/* requests
      BACKEND_URL: http://backend:8000

    depends_on:
      - backend

    restart: unless-stopped